name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Execution policy:
#   The ``triggers`` field in release/criteria.toml is the authoritative source
#   for which gates run on which events. This workflow implements:
#
#   pull_request — fast correctness gates: rust.*, http.*, filesystem.*,
#                  python qualification (unit-tests, native-tests, server-primitives,
#                  api-stability, boundary-hardening, client-primitives,
#                  server-integration), check-generated.
#   push         — all PR gates + supply-chain.*, package.*, packaging-smoke,
#                  wheel.smoke.* (these jobs have ``if: github.event_name == 'push'``).
#   scheduled    — not configured; add cron trigger here if periodic fuzzing or re-audit is desired.
#   Evidence type per trigger:
#     PR          → gate evidence uploaded as artifacts (retention 30 d), not attached to a release.
#     main push   → same gate evidence; release workflow can consume these artifacts.
#     (schedule)  → would produce evidence identical to main push.

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: gate/rust-full-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: bash scripts/ci-gate-evidence.sh rust.format lint-output cargo fmt --all -- --check
      - run: bash scripts/ci-gate-evidence.sh rust.clippy lint-output cargo clippy --workspace --all-targets -- -D warnings
      - run: bash scripts/ci-gate-evidence.sh rust.test test-output cargo test --workspace
      - run: bash scripts/ci-gate-evidence.sh rust.doctest test-output cargo test --workspace --doc
      - run: bash scripts/ci-gate-evidence.sh rust.test.client test-output cargo test -p eggserve-core --features client
      - run: bash scripts/ci-gate-evidence.sh rust.test.client-tls test-output sh -c 'cargo clippy -p eggserve-core --features client-tls --all-targets -- -D warnings && cargo test -p eggserve-core --features client-tls'
      - run: bash scripts/ci-gate-evidence.sh rust.test.server-tls test-output sh -c 'cargo clippy -p eggserve-bin --features tls --all-targets -- -D warnings && cargo test -p eggserve-bin --features tls'
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-rust-${{ matrix.os }}
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  supply-chain:
    name: gate/supply-chain
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Install pinned cargo supply-chain tools
        run: bash scripts/install-cargo-tools.sh
      - run: bash scripts/ci-gate-evidence.sh supply-chain.audit audit-output cargo audit
      - run: bash scripts/ci-gate-evidence.sh supply-chain.deny deny-output cargo deny check
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-supply-chain
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  wire-tests:
    name: gate/http-wire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: bash scripts/ci-gate-evidence.sh http.raw-wire test-output cargo test -p eggserve-core --test http_wire_correctness
      - run: bash scripts/ci-gate-evidence.sh http.primitives-integration test-output cargo test -p eggserve-core --test http_primitives_integration
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-http-wire
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  production-path:
    name: gate/production-path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: bash scripts/ci-gate-evidence.sh http.production-path test-output cargo test -p eggserve-bin --test production_path
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-production-path
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  corpus-replay:
    name: gate/corpus-replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Run corpus replay tests
        run: |
          if [ -d fuzz/corpus ]; then
            bash scripts/ci-gate-evidence.sh filesystem.corpus-replay test-output sh -c 'cargo test -p eggserve-core --test corpus_replay && cargo test -p eggserve-core --test corpus_replay --features client'
          else
            bash scripts/ci-gate-evidence.sh --skip "No fuzz corpus directory" filesystem.corpus-replay test-output
          fi
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-corpus-replay
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  python-unit-tests:
    name: gate/python-unit-tests
    needs: [rust-check]
    runs-on: ubuntu-latest
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: pip install maturin==1.14.1
      - name: Build packaged CLI binary
        run: cargo build --release --locked -p eggserve-bin
      - name: Stage packaged CLI binary
        run: |
          mkdir -p crates/eggserve-python/python/eggserve/bin
          cp target/release/eggserve crates/eggserve-python/python/eggserve/bin/eggserve
          chmod +x crates/eggserve-python/python/eggserve/bin/eggserve
      - name: Build wheel
        run: maturin build --release --interpreter python -o dist
        working-directory: crates/eggserve-python
      - name: Install wheel
        run: pip install --force-reinstall crates/eggserve-python/dist/*.whl
      - name: Test primitives
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_primitives -v
      - name: Test server primitives
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_server_primitives -v
      - name: Test API stability
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_api_stability -v
      - name: Test boundary hardening
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_boundary_hardening -v
      - name: Test client primitives
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_client_primitives -v
      - name: Test server integration
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_server_integration -v
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-python-unit-tests
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  packaging-smoke:
    name: gate/packaging-smoke
    if: github.event_name == 'push'
    needs: [python-unit-tests]
    runs-on: ubuntu-latest
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: pip install maturin==1.14.1
      - name: Build packaged CLI binary
        run: cargo build --release --locked -p eggserve-bin
      - name: Stage packaged CLI binary
        run: |
          mkdir -p crates/eggserve-python/python/eggserve/bin
          cp target/release/eggserve crates/eggserve-python/python/eggserve/bin/eggserve
          chmod +x crates/eggserve-python/python/eggserve/bin/eggserve
      - name: Build wheel
        run: maturin build --release --interpreter python -o dist
        working-directory: crates/eggserve-python
      - name: Run packaging smoke tests
        env:
          PYTHONPATH: ""
        run: |
          cd crates/eggserve-python/packaging-tests
          bash run_all.sh ../../dist/*.whl python
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-packaging-smoke
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  cargo-package:
    name: gate/package
    if: github.event_name == 'push'
    needs: [rust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Validate eggserve-core package
        run: bash scripts/ci-gate-evidence.sh package.core package-output bash scripts/verify-cargo-packages.sh --mode core
      - name: Validate eggserve-bin package
        run: bash scripts/ci-gate-evidence.sh package.bin package-output bash scripts/verify-cargo-packages.sh --mode bin
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-package
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  wheel-smoke:
    name: gate/python-${{ matrix.os }}
    if: github.event_name == 'push'
    needs: [rust-check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: python -m pip install maturin==1.14.1
      - name: Build packaged CLI binary
        run: cargo build --release --locked -p eggserve-bin
      - name: Stage packaged CLI binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p crates/eggserve-python/python/eggserve/bin
          cp target/release/eggserve crates/eggserve-python/python/eggserve/bin/eggserve
          chmod +x crates/eggserve-python/python/eggserve/bin/eggserve
      - name: Stage packaged CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force crates/eggserve-python/python/eggserve/bin | Out-Null
          Copy-Item target/release/eggserve.exe crates/eggserve-python/python/eggserve/bin/eggserve.exe
      - name: Build wheel
        run: maturin build --release --interpreter python -o dist
        working-directory: crates/eggserve-python
      - name: Run installed-wheel smoke tests
        shell: bash
        env:
          PYTHONPATH: ""
        run: bash crates/eggserve-python/packaging-tests/run_all.sh crates/eggserve-python/dist/*.whl python
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-python-${{ matrix.os }}
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  evidence-aggregate:
    name: gate/evidence-aggregate
    runs-on: ubuntu-latest
    if: always()
    needs: [rust-check, supply-chain, wire-tests, production-path, corpus-replay, python-unit-tests, packaging-smoke, cargo-package, wheel-smoke]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: gate-evidence-*
          path: evidence-artifacts/
          merge-multiple: false
      - name: Validate evidence records
        run: |
          python3 scripts/release_criteria.py validate \
            release/criteria.toml
          echo "Evidence artifacts collected:"
          find evidence-artifacts/ -type f -name '*.json' | sort || true
      - name: Verify generated checklist is clean
        run: python3 scripts/release_criteria.py generate-checklist --check --criteria release/criteria.toml --checklist-output docs/release-checklist.md
      - name: Verify commit SHA consistency
        run: |
          COMMIT_SHA="${GITHUB_SHA}"
          echo "Expected commit: ${COMMIT_SHA}"
          find evidence-artifacts/ -type f -name '*.json' -exec \
            python3 -c "
          import json, sys
          expected = sys.argv[1]
          for f in sys.argv[2:]:
              try:
                  data = json.load(open(f))
                  sha = data.get('commit_sha', '')
                  if sha and sha != expected:
                      print('WARNING: %s has commit %s, expected %s' % (f, sha, expected))
              except Exception:
                  pass
          " "${COMMIT_SHA}" {} +
      - name: Upload aggregate manifest
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-evidence-manifest
          path: evidence-artifacts/
          retention-days: 30
