name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo test -p eggserve-core --features client
      - run: cargo clippy -p eggserve-bin --features tls --all-targets -- -D warnings
      - run: cargo test -p eggserve-bin --features tls

  supply-chain:
    name: Supply chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo audit
      - run: cargo deny check

  wire-tests:
    name: Raw wire tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo test -p eggserve-core --test http_wire_correctness
      - run: cargo test -p eggserve-core --test http_primitives_integration
      - run: cargo test -p eggserve-bin --test production_path

  corpus-replay:
    name: Corpus replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Run corpus replay tests
        run: |
          if [ -d fuzz/corpus ]; then
            cargo test -p eggserve-core --test corpus_replay
            cargo test -p eggserve-core --test corpus_replay --features client
          else
            echo "No fuzz corpus directory, skipping"
          fi

  python-unit-tests:
    needs: [rust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: pip install maturin
      - name: Build wheel
        run: maturin build --release --interpreter 3.14 -o dist
        working-directory: crates/eggserve-python
      - name: Install wheel
        run: pip install --force-reinstall crates/eggserve-python/dist/*.whl
      - name: Test primitives
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_primitives -v
      - name: Test server primitives
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_server_primitives -v
      - name: Test API stability
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_api_stability -v
      - name: Test boundary hardening
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_boundary_hardening -v
      - name: Test client primitives
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_client_primitives -v
      - name: Test server integration
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_server_integration -v

  packaging-smoke:
    needs: [python-unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: pip install maturin
      - name: Build wheel
        run: maturin build --release --interpreter 3.14 -o dist
        working-directory: crates/eggserve-python
      - name: Run packaging smoke tests
        env:
          PYTHONPATH: ""
        run: |
          cd crates/eggserve-python/packaging-tests
          bash run_all.sh ../../dist/*.whl python3.14

  cargo-package:
    needs: [rust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo package -p eggserve-core --allow-dirty
      - run: cargo package -p eggserve-bin --allow-dirty
