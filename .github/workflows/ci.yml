name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: gate/rust-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace --doc
      - run: cargo test -p eggserve-core --features client
      - run: cargo clippy -p eggserve-core --features client-tls --all-targets -- -D warnings
      - run: cargo test -p eggserve-core --features client-tls
      - run: cargo clippy -p eggserve-bin --features tls --all-targets -- -D warnings
      - run: cargo test -p eggserve-bin --features tls
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-rust-${{ matrix.os }}
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  supply-chain:
    name: gate/supply-chain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Install pinned cargo supply-chain tools
        run: bash scripts/install-cargo-tools.sh
      - run: cargo audit
      - run: cargo deny check
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-supply-chain
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  wire-tests:
    name: gate/http-wire
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo test -p eggserve-core --test http_wire_correctness
      - run: cargo test -p eggserve-core --test http_primitives_integration
      - run: cargo test -p eggserve-bin --test production_path
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-http-wire
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  corpus-replay:
    name: gate/corpus-replay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Run corpus replay tests
        run: |
          if [ -d fuzz/corpus ]; then
            cargo test -p eggserve-core --test corpus_replay
            cargo test -p eggserve-core --test corpus_replay --features client
          else
            echo "No fuzz corpus directory, skipping"
          fi
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-corpus-replay
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  python-unit-tests:
    name: gate/python-unit-tests
    needs: [rust-check]
    runs-on: ubuntu-latest
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: pip install maturin==1.14.1
      - name: Build packaged CLI binary
        run: cargo build --release --locked -p eggserve-bin
      - name: Stage packaged CLI binary
        run: |
          mkdir -p crates/eggserve-python/python/eggserve/bin
          cp target/release/eggserve crates/eggserve-python/python/eggserve/bin/eggserve
          chmod +x crates/eggserve-python/python/eggserve/bin/eggserve
      - name: Build wheel
        run: maturin build --release --interpreter python -o dist
        working-directory: crates/eggserve-python
      - name: Install wheel
        run: pip install --force-reinstall crates/eggserve-python/dist/*.whl
      - name: Test primitives
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_primitives -v
      - name: Test server primitives
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_server_primitives -v
      - name: Test API stability
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_api_stability -v
      - name: Test boundary hardening
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_boundary_hardening -v
      - name: Test client primitives
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_client_primitives -v
      - name: Test server integration
        env:
          PYTHONPATH: ""
        run: python -m unittest eggserve.test_server_integration -v
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-python-unit-tests
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  packaging-smoke:
    name: gate/packaging-smoke
    needs: [python-unit-tests]
    runs-on: ubuntu-latest
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: pip install maturin==1.14.1
      - name: Build packaged CLI binary
        run: cargo build --release --locked -p eggserve-bin
      - name: Stage packaged CLI binary
        run: |
          mkdir -p crates/eggserve-python/python/eggserve/bin
          cp target/release/eggserve crates/eggserve-python/python/eggserve/bin/eggserve
          chmod +x crates/eggserve-python/python/eggserve/bin/eggserve
      - name: Build wheel
        run: maturin build --release --interpreter python -o dist
        working-directory: crates/eggserve-python
      - name: Run packaging smoke tests
        env:
          PYTHONPATH: ""
        run: |
          cd crates/eggserve-python/packaging-tests
          bash run_all.sh ../../dist/*.whl python
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-packaging-smoke
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  cargo-package:
    name: gate/package
    needs: [rust-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - name: Validate publishable Rust packages
        run: bash scripts/verify-cargo-packages.sh
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-package
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  wheel-smoke:
    name: gate/python-${{ matrix.os }}
    needs: [rust-check]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: python -m pip install maturin==1.14.1
      - name: Build packaged CLI binary
        run: cargo build --release --locked -p eggserve-bin
      - name: Stage packaged CLI binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p crates/eggserve-python/python/eggserve/bin
          cp target/release/eggserve crates/eggserve-python/python/eggserve/bin/eggserve
          chmod +x crates/eggserve-python/python/eggserve/bin/eggserve
      - name: Stage packaged CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force crates/eggserve-python/python/eggserve/bin | Out-Null
          Copy-Item target/release/eggserve.exe crates/eggserve-python/python/eggserve/bin/eggserve.exe
      - name: Build wheel
        run: maturin build --release --interpreter python -o dist
        working-directory: crates/eggserve-python
      - name: Run installed-wheel smoke tests
        shell: bash
        env:
          PYTHONPATH: ""
        run: bash crates/eggserve-python/packaging-tests/run_all.sh crates/eggserve-python/dist/*.whl python
      - name: Upload gate evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-evidence-python-${{ matrix.os }}
          path: |
            target/release-evidence/
          retention-days: 30
          if-no-files-found: ignore

  evidence-aggregate:
    name: gate/evidence-aggregate
    runs-on: ubuntu-latest
    if: always()
    needs: [rust-check, supply-chain, wire-tests, corpus-replay, python-unit-tests, packaging-smoke, cargo-package, wheel-smoke]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: gate-evidence-*
          path: evidence-artifacts/
          merge-multiple: false
      - name: Validate evidence records
        run: |
          python3 scripts/release_criteria.py validate \
            release/criteria.toml
          echo "Evidence artifacts collected:"
          find evidence-artifacts/ -type f -name '*.json' | sort || true
      - name: Verify generated checklist is clean
        run: python3 scripts/release_criteria.py generate-checklist --check --criteria release/criteria.toml
      - name: Verify commit SHA consistency
        run: |
          COMMIT_SHA="${GITHUB_SHA}"
          echo "Expected commit: ${COMMIT_SHA}"
          find evidence-artifacts/ -type f -name '*.json' -exec \
            python3 -c "
          import json, sys
          expected = sys.argv[1]
          for f in sys.argv[2:]:
              try:
                  data = json.load(open(f))
                  sha = data.get('commit_sha', '')
                  if sha and sha != expected:
                      print('WARNING: %s has commit %s, expected %s' % (f, sha, expected))
              except Exception:
                  pass
          " "${COMMIT_SHA}" {} +
      - name: Upload aggregate manifest
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-evidence-manifest
          path: evidence-artifacts/
          retention-days: 30
