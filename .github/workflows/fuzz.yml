name: Fuzz

on:
  schedule:
    - cron: "0 3 * * 1"  # Weekly Monday 3:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "Fuzz target to run (blank = all)"
        required: false
        default: ""
      duration:
        description: "Duration per target in seconds"
        required: false
        default: "60"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: Fuzz ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - request_target
          - percent_decode
          - path_components
          - url_parse
          - range_header
          - if_none_match
          - platform_component
          - validate_request_target
          - validate_method
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: nightly

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: fuzz-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: fuzz-${{ matrix.target }}-

      - name: Run fuzz target
        working-directory: fuzz
        run: |
          TARGET="${{ matrix.target }}"
          DURATION="${{ inputs.duration }}"
          if [ -n "${{ inputs.target }}" ] && [ "${{ inputs.target }}" != "$TARGET" ]; then
            echo "Skipping $TARGET (only running ${{ inputs.target }})"
            exit 0
          fi
          cargo fuzz run "$TARGET" -- -max_total_time=${DURATION:-60} 2>&1 || {
            echo "::error::Fuzz target $TARGET failed"
            exit 1
          }

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: fuzz/artifacts/${{ matrix.target }}/
          retention-days: 30
