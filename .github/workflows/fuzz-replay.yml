name: Fuzz replay

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

concurrency:
  group: fuzz-replay-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run corpus replay tests
        run: |
          if [ -d fuzz/corpus ]; then
            cargo test -p eggserve-core --test corpus_replay
            cargo test -p eggserve-core --test corpus_replay --features client
          else
            echo "No fuzz corpus directory, skipping"
          fi
