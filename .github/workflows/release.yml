name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip registry publication)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1

      - name: Install pinned cargo supply-chain tools
        run: bash scripts/install-cargo-tools.sh

      - name: Validate tag version consistency
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="manual"
          fi
          echo "Release tag: $TAG"

          # Extract version from Cargo.toml
          CORE_VERSION=$(grep -m1 '^version' crates/eggserve-core/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          BIN_VERSION=$(grep -m1 '^version' crates/eggserve-bin/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          PY_VERSION=$(grep -m1 '^version' crates/eggserve-python/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')

          echo "Core version: $CORE_VERSION"
          echo "Bin version: $BIN_VERSION"
          echo "Python version: $PY_VERSION"

          if [ "$CORE_VERSION" != "$BIN_VERSION" ]; then
            echo "::error::Version mismatch: core=$CORE_VERSION bin=$BIN_VERSION"
            exit 1
          fi

          if [ "$CORE_VERSION" != "$PY_VERSION" ]; then
            echo "::error::Version mismatch: core=$CORE_VERSION python=$PY_VERSION"
            exit 1
          fi

          if [ "$TAG" != "manual" ]; then
            BASE_TAG="${TAG%-rc.*}"
            if [ "$BASE_TAG" != "v$CORE_VERSION" ]; then
              echo "::error::Tag $TAG does not match version $CORE_VERSION"
              exit 1
            fi
          fi

          echo "All versions consistent: $CORE_VERSION"

      - name: Run all CI checks
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace
          cargo test --workspace --doc
          cargo test -p eggserve-core --features client
          cargo clippy -p eggserve-core --features client-tls --all-targets -- -D warnings
          cargo test -p eggserve-core --features client-tls
          cargo clippy -p eggserve-bin --features tls --all-targets -- -D warnings
          cargo test -p eggserve-bin --features tls
          cargo audit
          cargo deny check

      - name: Run raw wire tests
        run: |
          cargo test -p eggserve-core --test http_wire_correctness
          cargo test -p eggserve-core --test http_primitives_integration
          cargo test -p eggserve-bin --test production_path

      - name: Run corpus replay
        run: |
          if [ -d fuzz/corpus ]; then
            cargo test -p eggserve-core --test corpus_replay
            cargo test -p eggserve-core --test corpus_replay --features client
          fi

      - name: Package verification
        run: bash scripts/verify-cargo-packages.sh

  build-artifacts:
    name: Build ${{ matrix.target }}
    needs: [validate]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: eggserve-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: eggserve-aarch64-unknown-linux-gnu
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: eggserve-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: eggserve-aarch64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: eggserve-x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: release-${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build binary
        run: cargo build --release --locked --target ${{ matrix.target }} -p eggserve-bin

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release-files
          cp target/${{ matrix.target }}/release/eggserve release-files/eggserve
          cp README.md LICENSE release-files/
          tar czf ${{ matrix.artifact }}.tar.gz -C release-files .

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release-files | Out-Null
          Copy-Item target/${{ matrix.target }}/release/eggserve.exe release-files/eggserve.exe
          Copy-Item README.md, LICENSE release-files/
          Compress-Archive -Path release-files/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload Unix artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 5

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip
          retention-days: 5

  build-python:
    name: Build Python wheel
    needs: [validate]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: release-python-${{ matrix.os }}
      - run: python -m pip install maturin==1.14.1
      - name: Build packaged CLI binary
        run: cargo build --release --locked -p eggserve-bin
      - name: Stage packaged CLI binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p crates/eggserve-python/python/eggserve/bin
          cp target/release/eggserve crates/eggserve-python/python/eggserve/bin/eggserve
          chmod +x crates/eggserve-python/python/eggserve/bin/eggserve
      - name: Stage packaged CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force crates/eggserve-python/python/eggserve/bin | Out-Null
          Copy-Item target/release/eggserve.exe crates/eggserve-python/python/eggserve/bin/eggserve.exe
      - name: Build wheel
        run: maturin build --release --interpreter python -o dist
        working-directory: crates/eggserve-python
      - name: Run installed-wheel smoke tests
        shell: bash
        env:
          PYTHONPATH: ""
        run: bash crates/eggserve-python/packaging-tests/run_all.sh crates/eggserve-python/dist/*.whl python
      - name: Upload wheel
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: python-wheel-${{ matrix.os }}
          path: crates/eggserve-python/dist/*.whl
          retention-days: 5

  stage-release:
    name: Stage release
    needs: [build-artifacts, build-python]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.whl" \) -exec sha256sum {} \; | sort -k2 > checksums-sha256.txt
          echo "Checksums:"
          cat checksums-sha256.txt

      - name: Record provenance
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="manual"
          fi
          COMMIT="${{ github.sha }}"
          RUN_ID="${{ github.run_id }}"

          cat > provenance.json <<EOF
          {
            "tag": "$TAG",
            "commit": "$COMMIT",
            "run_id": "$RUN_ID",
            "workflow": "${{ github.workflow }}",
            "repository": "${{ github.repository }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          echo "Provenance:"
          cat provenance.json

      - name: Inspect staged release bundle
        run: bash scripts/inspect-release-bundle.sh artifacts provenance.json "${{ github.sha }}" "${{ github.run_id }}"

      - name: Upload release bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: release-bundle
          path: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.whl
            artifacts/checksums-sha256.txt
            provenance.json
          retention-days: 30

  publish:
    name: Publish to registries
    needs: [stage-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') && inputs.dry_run != 'true'
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master

      - name: Download release bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: release-bundle

      - name: Publish crates.io
        run: cargo publish -p eggserve-core --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index propagation
        run: sleep 30

      - name: Publish eggserve-bin to crates.io
        run: cargo publish -p eggserve-bin --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Set up Python for PyPI publish
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.14"
      - name: Upload staged Python wheel to PyPI
        run: python -m pip install twine==6.1.0 && twine upload artifacts/python-wheel-*/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/checksums-sha256.txt
            artifacts/**/*.whl
            provenance.json
          generate_release_notes: true
