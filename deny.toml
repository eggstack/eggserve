# cargo-deny configuration for eggserve
# Schema version 2: deprecated keys (vulnerability, unmaintained, notice,
# unlicensed, copyleft, default) are removed and the new defaults apply.
# See https://github.com/EmbarkStudios/cargo-deny/pull/611

[advisories]
version = 2
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Unicode-3.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []