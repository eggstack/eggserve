    "windows_handle_duplication_failure_is_typed — duplication failure returns error, no panic",
    "OwnedHandle does not implement Clone — compile-time prevention of double-close",
]
platform = "windows"
deterministic = true

[finding.gates_invalidated]
required = ["windows.handle-ownership"]

[finding.regression_test]
test_name = "windows_handle_duplication_failure_is_typed"
file = "crates/eggserve-core/tests/windows_plan084.rs"
command = "cargo test -p eggserve-core --test windows_plan084 --features windows-plan086 windows_handle"

# ════════════════════════════════════════════════════════════════════════
# Finding COR-003: response_write_timeout semantics mismatch
# ════════════════════════════════════════════════════════════════════════
[[finding]]
id = "COR-003"
title = "response_write_timeout behaves as total connection-lifetime timeout"
severity = "high"
subsystem = "runtime"
affected_profiles = ["unix-reverse-proxy", "unix-direct-https", "windows-reverse-proxy", "local-development"]
first_observed = "pre-074"
owning_plan = 77
release = "A"
status = "closed"
closure_commit = "e3782ab"
closure_plan = "077"
regression_evidence = "connection_total_timeout field rename, documentation update"

[finding.description]
text = "Field named response_write_timeout is implemented as an undocumented whole-connection lifetime, not a progress-aware write timeout. A steadily progressing response could be terminated."

[finding.reproduction]
strategy = "integration-test"
location = "crates/eggserve-core/tests/lifecycle_integration.rs"
cases = [
    "Server stops after connection_total_timeout even with active progress",
    "Documentation accurately describes the field as total connection lifetime",
]
platform = "all"
deterministic = true

[finding.gates_invalidated]
required = ["runtime.graceful-shutdown", "runtime.forced-shutdown", "http.production-path"]

[finding.regression_test]
test_name = "lifecycle_integration"
file = "crates/eggserve-core/tests/lifecycle_integration.rs"
command = "cargo test -p eggserve-core --test lifecycle_integration"

# ════════════════════════════════════════════════════════════════════════
# Finding COR-004: Forced shutdown drops JoinHandles without abort+join
# ════════════════════════════════════════════════════════════════════════
[[finding]]
id = "COR-004"
title = "Forced shutdown drops JoinHandles without aborting and joining"
severity = "critical"
subsystem = "runtime"
affected_profiles = ["unix-reverse-proxy", "unix-direct-https", "windows-reverse-proxy", "local-development"]
first_observed = "pre-074"
owning_plan = 77
release = "A"
status = "closed"
closure_commit = "e3782ab"
closure_plan = "077"
regression_evidence = "JoinSet migration with abort_all + join_all on forced shutdown"

[finding.description]
text = "Vec<JoinHandle> is dropped without abort+join, allowing detached work after server reports Stopped. Server can transition to Stopped while connection tasks are non-empty."

[finding.reproduction]
strategy = "integration-test"
location = "crates/eggserve-core/tests/lifecycle_integration.rs"
cases = [
    "Forced shutdown aborts all tasks and joins before Stopped",
    "File handles and permits return to baseline after forced shutdown",
]
platform = "all"
deterministic = true

[finding.gates_invalidated]
required = ["runtime.graceful-shutdown", "runtime.forced-shutdown", "soak.unix-reverse-proxy"]

[finding.regression_test]
test_name = "lifecycle_integration"
file = "crates/eggserve-core/tests/lifecycle_integration.rs"
command = "cargo test -p eggserve-core --test lifecycle_integration"

