# reproduction strategy.

[meta]
schema_version = "1.0.0"
plan = 75
tracks = ["B", "C"]
title = "Corrective Finding Registry"
baseline_sha = "e3782abd971902e63a6b33d52b7a472da63e2310"

# ──────────────────────────────────────────────────────────────────────
# Severity legend:
#   critical — memory/handle unsafety, confinement failure, handler
#              invocation despite rejection, false release evidence,
#              detached work after claimed shutdown (externally exploitable)
#   high     — material protocol ambiguity, API contract violation,
#              incorrect lifecycle state
