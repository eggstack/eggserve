# Finding COR-002: Windows raw-handle ownership hazard
# ════════════════════════════════════════════════════════════════════════
[[finding]]
id = "COR-002"
title = "Windows raw-handle ownership contains borrowed-vs-owned hazard"
severity = "critical"
subsystem = "filesystem"
affected_profiles = ["windows-reverse-proxy", "windows-direct-https", "windows-functional"]
first_observed = "pre-074"
owning_plan = 76
