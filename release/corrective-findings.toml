closure_plan = "084"
regression_evidence = "windows-plan084::windows_handle_duplication_failure_is_typed"

[finding.description]
text = "Borrowed handles can be accidentally closed through owned wrappers; handle duplication uses panic-capable paths instead of fallible try_clone."

[finding.reproduction]
