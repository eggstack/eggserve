# ════════════════════════════════════════════════════════════════════════
# Finding COR-001: Windows native string length from UTF-8 bytes
# ════════════════════════════════════════════════════════════════════════
[[finding]]
id = "COR-001"
title = "Windows native string lengths derived from UTF-8 byte counts"
severity = "critical"
subsystem = "filesystem"
affected_profiles = ["windows-reverse-proxy", "windows-direct-https", "windows-functional"]
first_observed = "pre-074"
owning_plan = 76
release = "A"
status = "closed"
closure_commit = "e3782ab"
closure_plan = "084"
regression_evidence = "windows-plan084::windows_unicode_bmp_non_ascii, windows_unicode_surrogate_pair"

[finding.description]
text = "UNICODE_STRING call sites use UTF-8 byte counts instead of UTF-16 code unit lengths for component names, causing incorrect buffer sizes for non-ASCII paths."

[finding.reproduction]
strategy = "integration-test"
location = "crates/eggserve-core/tests/windows_plan084.rs"
cases = [
    "windows_unicode_bmp_non_ascii — Latin/Cyrillic/CJK through production resolver",
    "windows_unicode_surrogate_pair — supplementary plane characters",
    "windows_unicode_case_insensitive — case folding through production resolver",
]
platform = "windows"
deterministic = true

[finding.gates_invalidated]
required = ["windows.unicode-child-production-path"]
optional = ["windows.handle-ownership", "windows.reparse-matrix", "windows.namespace-matrix"]

[finding.regression_test]
test_name = "windows_unicode_bmp_non_ascii"
file = "crates/eggserve-core/tests/windows_plan084.rs"
command = "cargo test -p eggserve-core --test windows_plan084 --features windows-plan086 windows_unicode"

