# ---------------------------------------------------------------------------
# Release gates
# ---------------------------------------------------------------------------

[[gate]]
id = "release.dry-run"
title = "Release workflow dry run"
description = "Full release pipeline validation without registry publication"
required = true
evidence_classes = ["ci-log", "release-output"]
command = "cargo fmt --all -- --check && cargo clippy --workspace --all-targets -- -D warnings && cargo test --workspace && cargo test --workspace --doc && cargo test -p eggserve-core --features client && cargo clippy -p eggserve-core --features client-tls --all-targets -- -D warnings && cargo test -p eggserve-core --features client-tls && cargo clippy -p eggserve-bin --features tls --all-targets -- -D warnings && cargo test -p eggserve-bin --features tls && cargo audit && cargo deny check"
workflow_job = "validate"
platforms = ["linux"]
features = []
artifacts = []
triggers = ["manual_dispatch"]
max_age_days = 1
invalidated_by = ["**"]
depends_on = ["rust.format", "rust.clippy", "rust.test", "supply-chain.audit", "supply-chain.deny"]
waiver_allowed = false
security_relevance = true
release_stage = "approval"

[[gate]]
id = "release.artifacts"
title = "Release artifact assembly and checksums"
description = "Assembles release artifacts, generates SHA-256 checksums, and stages release bundle"
required = true
evidence_classes = ["ci-log", "checksum", "provenance"]
command = "bash scripts/inspect-release-bundle.sh artifacts provenance.json \"${GITHUB_SHA}\" \"${GITHUB_RUN_ID}\""
workflow_job = "stage-release"
platforms = ["linux"]
features = []
artifacts = ["release-bundle", "checksums-sha256.txt"]
triggers = ["tagged_push"]
max_age_days = 1
invalidated_by = ["crates/**", "Cargo.toml", "Cargo.lock"]
depends_on = ["release.dry-run"]
waiver_allowed = false
security_relevance = true
release_stage = "artifact"

[[gate]]
id = "release.provenance"
title = "Release provenance record"
description = "Records tag, commit, run ID, and timestamp for the release"
required = true
evidence_classes = ["provenance"]
command = "echo '{\"tag\": \"${TAG}\", \"commit\": \"${COMMIT}\", \"run_id\": \"${RUN_ID}\"}'"
workflow_job = "stage-release"
platforms = ["linux"]
features = []
artifacts = ["provenance.json"]
triggers = ["tagged_push"]
max_age_days = 1
invalidated_by = ["crates/**", "Cargo.toml"]
depends_on = ["release.artifacts"]
waiver_allowed = false
security_relevance = true
release_stage = "approval"

[[gate]]
id = "release.human-approval"
title = "Human RC approval"
description = "Manual review and approval of the release candidate before publication"
required = true
evidence_classes = ["approval-record"]
command = "echo 'Requires manual approval via GitHub environment protection rules'"
workflow_job = "publish"
platforms = ["linux"]
features = []
artifacts = []
triggers = ["tagged_push"]
max_age_days = 7
invalidated_by = ["crates/**"]
depends_on = ["release.provenance"]
waiver_allowed = false
security_relevance = true
release_stage = "approval"

[[gate]]
id = "check-generated"
title = "Generated file cleanliness"
description = "Verifies that generated release checklist and other artifacts match their source of truth"
required = true
evidence_classes = ["ci-log", "lint-output"]
command = "python3 scripts/release_criteria.py generate-checklist --check --criteria release/criteria.toml"
