description = "A signed/recorded decision for each Windows profile (windows-reverse-proxy, windows-direct-https, windows-functional, link-following-compat) based on exact-SHA evidence from all preceding gates. Promotion updates support-profiles.toml, generated docs, release checklist, and release notes atomically."
required = true
evidence_classes = ["approval-record"]
command = "echo 'Requires human decision record'"
workflow_job = "evidence-aggregate"
platforms = ["linux"]
features = []
artifacts = []
triggers = ["manual_dispatch"]
max_age_days = 30
invalidated_by = ["release/support-profiles.toml", "release/criteria.toml"]
depends_on = ["windows.independent-safety-review", "windows.installed-artifact", "windows.fuzz-corpus-replay"]
waiver_allowed = false
security_relevance = true
release_stage = "qualification"

[[gate]]
id = "check-generated"
title = "Generated file cleanliness"
description = "Verifies that generated release checklist and other artifacts match their source of truth"
required = true
evidence_classes = ["ci-log", "lint-output"]
command = "python3 scripts/release_criteria.py generate-checklist --check --criteria release/criteria.toml"
workflow_job = "evidence-aggregate"
platforms = ["linux"]
features = []
artifacts = []
triggers = ["pull_request", "push"]
max_age_days = 1
invalidated_by = ["release/criteria.toml", "docs/release-checklist.md"]
depends_on = []
waiver_allowed = false
security_relevance = false
release_stage = "preflight"
