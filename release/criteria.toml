# eggserve release gates — machine-readable source of truth
# Defines every gate from the CI workflow and release checklist.
# Each gate maps to a CI job step, a validation command, and evidence requirements.

[meta]
schema_version = "1.0.0"
project = "eggserve"
version = "0.1.0"
description = "Release gate definitions for eggserve CI/CD pipeline"

# ---------------------------------------------------------------------------
# Supported platforms and language versions
# ---------------------------------------------------------------------------

[platforms.linux]
runner = "ubuntu-latest"
targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]
support = "supported-hardened"

[platforms.macos]
runner = "macos-latest"
targets = ["x86_64-apple-darwin", "aarch64-apple-darwin"]
support = "supported-hardened"

[platforms.windows]
runner = "windows-latest"
targets = ["x86_64-pc-windows-msvc"]
support = "supported-functional"
support_note = "Reparse-point hardening is deferred; do not use with untrusted mutable public content"

[languages.rust]
toolchain = "stable"
edition = "2021"
msrv = "current-stable"
msrv_policy = "Current stable Rust is required. No MSRV testing in CI; the project tracks stable releases."

[languages.python]
version = "3.14"
constraint = ">=3.14,<3.15"
implementations = ["cpython"]
unsupported_implementations = ["pypy", "free-threaded-cpython"]

# ---------------------------------------------------------------------------
# Rust correctness gates
# ---------------------------------------------------------------------------

[[gate]]
id = "rust.format"
title = "Rust formatting check"
description = "Enforces rustfmt style on all workspace crates"
required = true
evidence_classes = ["ci-log", "lint-output"]
command = "cargo fmt --all -- --check"
workflow_job = "rust-check"
platforms = ["linux", "macos", "windows"]
features = []
artifacts = []
triggers = ["pull_request", "push"]
max_age_days = 1
invalidated_by = ["crates/**/src/**", "Cargo.toml"]
depends_on = []
waiver_allowed = false
security_relevance = false
release_stage = "preflight"

[[gate]]
id = "rust.clippy"
title = "Workspace clippy lint"
description = "Runs clippy on all workspace targets with warnings-as-errors"
