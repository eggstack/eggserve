# eggserve production support profiles — machine-readable source of truth
# Defines the supported deployment configurations and their security claims.
# Each profile maps to required CI gates, evidence requirements, and exclusions.

[metadata]
schema_version = "1"
description = "eggserve production support profiles — single source of truth for production claims"
last_updated = "2026-07-16"

# ---------------------------------------------------------------------------
# unix-reverse-proxy: Linux/macOS behind Caddy/nginx/Traefik
# ---------------------------------------------------------------------------

[[profile]]
profile = "unix-reverse-proxy"
status = "supported-hardened"
platform = ["linux-x86_64", "linux-aarch64", "macos-x86_64", "macos-aarch64"]
filesystem = ["ext4", "apfs", "hfs+"]
network_binding = "loopback"
tls_termination = "reverse-proxy"
http_version = "1.1"
security_defaults = [
    "loopback-bind",
    "no-symlinks",
    "no-dotfiles",
    "no-directory-listing",
]
symlink_following_allowed = false
directory_listing_hardened = false
python_callbacks_in_profile = true
required_gates = [
    "rust.format",
    "rust.clippy",
    "rust.test",
    "rust.doctest",
    "rust.test.client",
    "rust.test.client-tls",
    "rust.test.server-tls",
    "supply-chain.audit",
    "supply-chain.deny",
    "check-generated",
    "http.raw-wire",
    "http.production-path",
    "http.primitives-integration",
    "filesystem.corpus-replay",
    "conformance.canonical-http-corpus-rust",
    "conformance.canonical-http-corpus-python",
    "conformance.public-rust-compile-fixtures",
    "conformance.python-api-import-fixtures",
    "conformance.fuzz-corpus-replay",
    "conformance.raw-wire-normalization",
    "conformance.canonical-wire-interop",
    "conformance.generated-api-inventory",
    "conformance.perf-regression-report",
    "python.unit-tests",
    "python.native-tests",
    "python.server-primitives",
    "python.api-stability",
    "python.boundary-hardening",
    "python.client-primitives",
    "python.server-integration",
    "python.lifecycle-parity",
    "python.resource-qualification",
    "python.contract-consistency",
    "python.wheel.linux",
    "python.wheel.macos",
    "python.runtime-parity",
    "python.callback-timeout",
    "python.lifecycle-linux",
    "python.lifecycle-macos",
    "body.public-rust-consumer",
    "body.fixed-length-accounting",
    "body.chunked-accounting",
    "body.limit-enforcement",
    "body.timeout-cancellation",
    "body.partial-consumption",
    "body.static-rejection",
    "body.corpus-replay",
    "body.wire-tests",
    "python.body-primitives",
    "python.body-conformance",
    "python.body-wire",
    "python.body-lifecycle-linux",
    "python.body-lifecycle-macos",
    "python.body-parity",
    "python.body-timeout",
    "body.fuzz-smoke",
    "proxy.caddy-interop",
    "proxy.nginx-interop",
    "proxy.desync-corpus",
    "stateful.fuzz-replay",
    "filesystem.unix-race",
    "fault.injection",
    "soak.unix-reverse-proxy",
    "artifact.installed-binaries",
    "supply-chain.sbom",
    "release.independent-review",
    "release.profile-decision",
]
excluded_flags = [
    "follow-symlinks",
    "dotfiles",
    "directory-listing",
]
evidence_max_age = "30d"
invalidation_paths = [
    "crates/**/src/**",
    "Cargo.toml",
    "Cargo.lock",
    "crates/eggserve-python/**",
]
waivers_allowed = true
notes = "Preferred public deployment. Reverse proxy handles TLS termination and public binding. Plan 089 qualification gates (proxy interop, desync corpus, stateful fuzz, filesystem race, fault injection, 24h soak, installed artifacts, SBOM/provenance, independent review, profile decision) are required for promotion."

